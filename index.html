<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPER Hero</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 24px 216px 16px 272px;
      width: 100%;
      background-color: #121211;
      /* Agregar background-image con la imagen de fondo */
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #121211;
      border: 1px solid #989696;
      border-radius: 12px;
      padding: 4px 12px;
    }

    .pill__text {
      font-family: 'Gotham', sans-serif;
      font-weight: 900;
      font-size: 14px;
      line-height: 24px;
      letter-spacing: 0.01px;
      text-transform: uppercase;
      color: #cbcbcb;
      white-space: nowrap;
    }

    .hero__heading {
      width: 728px;
      font-family: 'Gotham', sans-serif;
      font-weight: 900;
      font-size: 80px;
      line-height: 64px;
      letter-spacing: -3.2px;
      text-transform: uppercase;
      color: white;
      text-align: center;
    }

    .hero__subtitle {
      font-family: 'Gotham', sans-serif;
      font-weight: 325;
      font-size: 20px;
      line-height: 24px;
      letter-spacing: -0.4px;
      color: #989696;
      text-align: center;
    }

    .hero__cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 20px 28px;
      border-radius: 9999px;
      border: 2px solid;
      font-family: 'Gotham', sans-serif;
      font-weight: 900;
      font-size: 16px;
      line-height: 1.2;
      letter-spacing: 0.01px;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
      text-decoration: none;
    }

    .btn--secondary {
      background-color: transparent;
      border-color: white;
      color: white;
    }

    .btn--primary {
      background-color: #f98516;
      border-color: #f98516;
      color: black;
    }
  </style>
</head>
<body>
  <section class="hero">

    <div class="pill">
      <span class="pill__text">Agencia Creativa</span>
    </div>

    <h1 class="hero__heading">
      No hacemos marketing, hacemos que tenga sentido.
    </h1>

    <p class="hero__subtitle">
      Campaigns content and experiences that convert.
    </p>

    <div class="hero__cta">
      <a href="#" class="btn btn--secondary">Schedule a call</a>
      <a href="#" class="btn btn--primary">View Work</a>
    </div>

  </section>
</body>
</html>
