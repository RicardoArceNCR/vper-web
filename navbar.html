<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPER — Navbar</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--background-page);
      font-family: 'Gotham', sans-serif;
    }

    /* ══════════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════════ */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background-color: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
    }

    /* ── NAV wrapper ─────────────────────────────── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--layout-header-padding-y) var(--layout-header-padding-x);
      max-width: 1280px;
      margin: 0 auto;
    }

    /* ── LOGO ────────────────────────────────────── */
    .nav__logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav__logo svg {
      height: 28px;
      width: auto;
      fill: var(--text-color-primary);
    }

    /* ── HAMBURGER ───────────────────────────────── */
    .nav__hamburger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 40px;
      height: 40px;
      padding: var(--spacing-2);
      background: none;
      border: none;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: background-color 150ms ease;
    }

    .nav__hamburger:hover {
      background-color: var(--surface-raised);
    }

    .nav__hamburger:focus-visible {
      outline: 2px solid var(--focus-ring-color);
      outline-offset: 2px;
    }

    .nav__hamburger-line {
      display: block;
      width: 100%;
      height: 2px;
      background-color: var(--text-color-primary);
      border-radius: 2px;
      transition: transform 250ms ease, opacity 200ms ease;
      transform-origin: center;
    }

    /* hamburger → X cuando está abierto */
    .nav__hamburger[aria-expanded="true"] .nav__hamburger-line:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .nav__hamburger[aria-expanded="true"] .nav__hamburger-line:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    .nav__hamburger[aria-expanded="true"] .nav__hamburger-line:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* ── MENU (mobile: oculto por defecto) ────────── */
    .nav__menu {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-1);

      /* posición mobile */
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
      padding: var(--spacing-4) var(--layout-header-padding-x);

      /* oculto por defecto */
      visibility: hidden;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 200ms ease, transform 200ms ease, visibility 0ms linear 200ms;
      pointer-events: none;
    }

    .nav__menu.is-open {
      visibility: visible;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 200ms ease, transform 200ms ease, visibility 0ms;
      pointer-events: auto;
    }

    /* ── LINKS ───────────────────────────────────── */
    .nav__links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-1);
    }

    .nav__link {
      display: block;
      padding: var(--spacing-3) var(--spacing-2);
      font-family: 'Gotham', sans-serif;
      font-weight: var(--typography-weight-medium);
      font-size: var(--typography-size-sm);
      letter-spacing: var(--typography-letter-spacing-button);
      text-transform: uppercase;
      text-decoration: none;
      color: var(--nav-item-color);
      border-radius: var(--radius-sm);
      transition: color 150ms ease, background-color 150ms ease;
    }

    .nav__link:hover {
      color: var(--text-color-primary);
      background-color: var(--surface-raised);
    }

    .nav__link.is-active {
      color: var(--nav-item-color-active);
    }

    .nav__link:focus-visible {
      outline: 2px solid var(--focus-ring-color);
      outline-offset: 2px;
    }

    /* ── DIVIDER mobile ──────────────────────────── */
    .nav__divider {
      height: 1px;
      background-color: var(--nav-border);
      margin: var(--spacing-2) 0;
    }

    /* ── CTA BUTTON ──────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-3) var(--spacing-5);
      border-radius: var(--button-base-radius);
      border: var(--button-base-border-width-md) solid;
      font-family: 'Gotham', sans-serif;
      font-weight: 900;
      font-size: var(--button-text-size-md);
      line-height: var(--button-base-line-height);
      letter-spacing: var(--button-base-letter-spacing);
      text-transform: uppercase;
      white-space: nowrap;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 150ms ease, color 150ms ease,
                  border-color 150ms ease, transform 150ms ease;
    }

    .btn--secondary {
      background-color: var(--button-secondary-bg);
      border-color: var(--button-secondary-border);
      color: var(--button-secondary-text);
    }

    .btn--secondary:hover {
      background-color: var(--color-neutral-900);
      border-color: var(--color-neutral-900);
      color: var(--color-neutral-0);
    }

    .btn--secondary:active {
      transform: scale(0.98);
    }

    .btn--secondary:focus-visible {
      outline: 2px solid var(--focus-ring-color);
      outline-offset: 3px;
    }

    /* en mobile el botón ocupa todo el ancho */
    .nav__cta {
      width: 100%;
      justify-content: center;
    }

    /* ══════════════════════════════════════════════
       TABLET 768px+
    ══════════════════════════════════════════════ */
    @media (min-width: 768px) {
      /* hamburger desaparece */
      .nav__hamburger {
        display: none;
      }

      /* menú siempre visible, en fila */
      .nav__menu {
        position: static;
        flex-direction: row;
        align-items: center;
        gap: var(--layout-header-navbar-gap-x);
        padding: 0;
        background: none;
        border: none;
        visibility: visible;
        opacity: 1;
        transform: none;
        transition: none;
        pointer-events: auto;
      }

      .nav__links {
        flex-direction: row;
        gap: var(--spacing-1);
      }

      .nav__divider {
        display: none;
      }

      .nav__cta {
        width: auto;
      }
    }

    /* ══════════════════════════════════════════════
       DEMO — contenido de página de fondo
    ══════════════════════════════════════════════ */
    .demo-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100svh - 61px);
      color: var(--text-color-secondary);
      font-size: var(--typography-size-sm);
      letter-spacing: var(--typography-letter-spacing-button);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header class="header">
    <nav class="nav" aria-label="Navegación principal">

      <!-- Logo -->
      <a href="/" class="nav__logo" aria-label="VPER — Inicio">
        <svg viewBox="0 0 80 28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <text
            x="0" y="22"
            font-family="Gotham, sans-serif"
            font-weight="900"
            font-size="28"
            letter-spacing="-1"
            fill="currentColor"
          >VPER</text>
        </svg>
      </a>

      <!-- Hamburger (solo mobile) -->
      <button
        class="nav__hamburger"
        aria-label="Abrir menú"
        aria-expanded="false"
        aria-controls="nav-menu"
      >
        <span class="nav__hamburger-line"></span>
        <span class="nav__hamburger-line"></span>
        <span class="nav__hamburger-line"></span>
      </button>

      <!-- Menu -->
      <div class="nav__menu" id="nav-menu" role="navigation">
        <ul class="nav__links">
          <li><a href="#" class="nav__link is-active">Work</a></li>
          <li><a href="#" class="nav__link">Services</a></li>
          <li><a href="#" class="nav__link">About</a></li>
          <li><a href="#" class="nav__link">Contact</a></li>
        </ul>

        <div class="nav__divider" aria-hidden="true"></div>

        <a href="#" class="btn btn--secondary nav__cta">Schedule a call</a>
      </div>

    </nav>
  </header>

  <!-- Contenido demo -->
  <main class="demo-page" aria-label="Contenido de ejemplo">
    ↑ Navbar demo — integrá con index.html
  </main>

  <script>
    const hamburger = document.querySelector('.nav__hamburger');
    const menu = document.querySelector('.nav__menu');

    hamburger.addEventListener('click', () => {
      const isOpen = hamburger.getAttribute('aria-expanded') === 'true';
      hamburger.setAttribute('aria-expanded', String(!isOpen));
      hamburger.setAttribute('aria-label', isOpen ? 'Abrir menú' : 'Cerrar menú');
      menu.classList.toggle('is-open', !isOpen);
    });

    // Cerrar menú al hacer clic fuera
    document.addEventListener('click', (e) => {
      if (!hamburger.contains(e.target) && !menu.contains(e.target)) {
        hamburger.setAttribute('aria-expanded', 'false');
        hamburger.setAttribute('aria-label', 'Abrir menú');
        menu.classList.remove('is-open');
      }
    });

    // Cerrar menú al presionar Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && menu.classList.contains('is-open')) {
        hamburger.setAttribute('aria-expanded', 'false');
        hamburger.setAttribute('aria-label', 'Abrir menú');
        menu.classList.remove('is-open');
        hamburger.focus();
      }
    });
  </script>

</body>
</html>
